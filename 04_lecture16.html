// MultiMedia and ARIA in HTML //

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
</head>
<body>

    <!-- Normal way of adding image -->
    <!-- img Enter -->
    <!-- title attribute shows Profile photo when we take cursor on our image --> 
    <!-- alt attribute shows Profile photo without loading the image when image path is incorrect -->
    <img src="./ganeshaa.jpg" title="Profile photo"alt="Profile photo" width="200px">

    <!-- Another type of adding image using figure tag -->
    <!-- figure enter -->
    <figure>

        <!-- Inserting image -->
        <!-- img Enter -->
        <img src="./ganesha.jpg" alt="Profile photo" width="200px">

        <!-- Creating figcaption -->
        <!-- figcaption Enter -->
        <!-- figcaption contains caption about the image -->
        <figcaption>

          A T-Rex on display in the Manchester University Museum.

        </figcaption>
    </figure>

    <!-- Inserting video -->
    <!-- video Enter -->
    <!-- controls attribute add Controls to the video-->
    <!-- controlslist zttribute Control the controls attribute -->
    <!-- Inside controlslist attribute write nodownload,now download option is not available -->
    <video src="./chai_pe_charcha-1080.mp4" width="200px" controls controlslist="nodownload"></video>
    
</body>
</html>
